name: manga_reader
description: A Flutter manga reader app using MangaDex API

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Network
  dio: ^5.4.0

  # Cloud Database
  supabase_flutter: ^2.8.0 # AJOUT ICI

  # Local Storage
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.0 # DÉPLACÉ ICI (nécessaire pour Linux au runtime)
  shared_preferences: ^2.2.3

  # Images
  cached_network_image: ^3.3.1
  photo_view: ^0.14.0

  # Notifications
  # flutter_local_notifications: ^16.3.2

  # Sécurité
  crypto: ^3.0.3

  # Utils
  intl: ^0.19.0
  path_provider: ^2.1.2
  path: ^1.9.0
  logger: ^2.0.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.8
  # isar_generator: ^3.1.0+1 # SUPPRIMÉ (Isar est mort)