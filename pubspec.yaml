name: manga_reader
description: A Flutter manga reader app using MangaDex API

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State Management
  flutter_riverpod: ^2.4.0

  # Network
  dio: ^5.3.0

  # Local Storage
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  shared_preferences: ^2.2.0

  # Images
  cached_network_image: ^3.3.0
  photo_view: ^0.14.0

  # Notifications
  flutter_local_notifications: ^16.3.0

  # Utils
  intl: ^0.19.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.0
  isar_generator: ^3.1.0

flutter:
  uses-material-design: true